name: Scrape Telegram

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "incremental (default) or full"
        required: false
        default: "incremental"
        type: choice
        options:
          - incremental
          - full
      date_from:
        description: "YYYY-MM-DD (only used with mode=full)"
        required: false
        default: ""

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: scrape
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          PYTHONUNBUFFERED: "1"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SCRAPE_TRIGGERED_BY: "github-actions"
        run: |
          python scraper.py \
            --mode "${{ github.event.inputs.mode || 'incremental' }}" \
            ${{ github.event.inputs.date_from && format('--date-from {0}', github.event.inputs.date_from) || '' }}
